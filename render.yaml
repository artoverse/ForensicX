services:
  - type: web
    name: forensicx
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: API_RELOAD
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
      # HuggingFace API Token — set this in the Render dashboard (keep secret)
      # Get a free token at: https://huggingface.co/settings/tokens
      - key: HF_TOKEN
        sync: false   # Render will prompt you to enter this secret manually
      # Optional: override the LLM model
      - key: HF_MODEL
        value: "meta-llama/Meta-Llama-3-8B-Instruct"
    healthCheckPath: /health
    autoDeploy: true
